[supervisord]
nodaemon=true
logfile=/data/log/supervisord.log
logfile_maxbytes=10MB
loglevel=info
pidfile=/tmp/supervisord.pid

[program:mongodb]
command=mongod --dbpath /data/db --logpath /data/log/mongod.log --bind_ip 127.0.0.1 --port 27017
autostart=true
autorestart=true
priority=10
startsecs=5
stdout_logfile=/dev/null
stderr_logfile=/dev/null

[program:backend]
command=/app/venv/bin/uvicorn main:app --host 127.0.0.1 --port 8000
directory=/app/backend
autostart=true
autorestart=true
priority=20
startsecs=8
startretries=15
stdout_logfile=/data/log/backend.log
stderr_logfile=/data/log/backend.log

[program:frontend]
command=node server.js
directory=/app/frontend
autostart=true
autorestart=true
priority=30
startsecs=3
startretries=10
stdout_logfile=/data/log/frontend.log
stderr_logfile=/data/log/frontend.log
